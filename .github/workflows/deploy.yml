name: Deploy Hugo Blog

on:
  push:
    branches: [main]
    paths:
      - "blog/**"

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest changes
        working-directory: /home/yhk/kimyohan.kr
        run: |
          git pull
          git submodule update --init --recursive

      - name: Build Hugo
        working-directory: /home/yhk/kimyohan.kr
        run: docker compose run --rm hugo
