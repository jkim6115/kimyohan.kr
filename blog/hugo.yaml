baseURL: "https://www.kimyohan.kr/"
title: "YHK Blog"
pagination:
  pagerSize: 10
theme: PaperMod

languageCode: ko
defaultContentLanguage: ko

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: YHK
  description: YHK의 개인 블로그
  author: YHK

  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    disableHLJS: true

  label:
    text: "YHK Blog"

  homeInfoParams:
    Title: "안녕하세요 👋"
    Content: >
      개발하고 기록합니다.

  socialIcons:
    - name: github
      url: "https://github.com/jkim6115"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  editPost:
    URL: ""
    Text: ""
    appendFilePath: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: 글
      url: /posts/
      weight: 10
    - identifier: tags
      name: 태그
      url: /tags/
      weight: 20
    - identifier: search
      name: 검색
      url: /search/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON
