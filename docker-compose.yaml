services:

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./blog/public:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

  beszel:
    image: henrygd/beszel
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - beszel_data:/beszel/data
    networks:
      - monitoring

  beszel-agent:
    image: henrygd/beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PORT=45876
      - KEY=${BESZEL_AGENT_KEY}

networks:
  web:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  beszel_data:
